<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Discord</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="auth-screen" class="login-screen">
    <div class="login-box">
        <h2>Mini Discord Online</h2>
        <div id="login-form">
            <input type="text" id="loginUsername" placeholder="Digite seu nome...">
            <input type="password" id="loginPassword" placeholder="Digite sua senha...">
            <button id="loginBtn">Entrar</button>
            <p>Não tem conta? <span id="showRegister" style="cursor:pointer; color:#7289da;">Cadastre-se</span></p>
        </div>
        <div id="register-form" style="display:none;">
            <input type="text" id="registerUsername" placeholder="Escolha um nome...">
            <input type="password" id="registerPassword" placeholder="Escolha uma senha...">
            <label style="color: #b9bbbe; font-size: 12px; display: block; margin-bottom: 5px;">Foto de Perfil:</label>
            <input type="file" id="registerAvatar" accept="image/*">
            <button id="registerBtn">Cadastrar</button>
            <p>Já tem conta? <span id="showLogin" style="cursor:pointer; color:#7289da;">Entrar</span></p>
        </div>
        <p id="authMessage" style="color:#faa; margin-top:10px;"></p>
    </div>
</div>

<div id="chat-screen" class="container" style="display:none;">
    <aside class="sidebar">
        <h2>Canais</h2>
        <ul>
            <li class="channel-link active" data-channel="geral"># Geral</li>
            <li class="channel-link" data-channel="jogos"># Jogos</li>
            <li class="channel-link" data-channel="musica"># Música</li>
            <li id="startVoice" style="color: #43b581; font-weight: bold; cursor: pointer; margin-top: 20px; list-style: none;">🔊 ENTRAR EM CALL</li>
        </ul>
    </aside>

    <main class="chat-area">
        <div class="chat-header">
            <h2 id="channel-name"># Geral</h2>
            <button id="logoutBtn" style="float:right; padding:5px 10px; background:#F04747; border:none; border-radius:5px; cursor:pointer; color:white;">Sair</button>
        </div>

        <div id="text-chat-content" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
            <div class="chat-messages" id="messages"></div>
            
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Digite sua mensagem...">
                <button id="sendBtn">Enviar</button>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
